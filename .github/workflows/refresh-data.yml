name: Refresh REDCap Data

on:
  schedule:
    # Every 6 hours at :17 past the hour (avoids the :00 stampede)
    - cron: "17 */6 * * *"

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch data from REDCap
        env:
          REDCAP_API_URL: ${{ secrets.REDCAP_API_URL }}
          REDCAP_SPARK_TOKEN: ${{ secrets.REDCAP_SPARK_TOKEN }}
          REDCAP_RECRUIT_TOKEN: ${{ secrets.REDCAP_RECRUIT_TOKEN }}
        run: node scripts/fetch-data.mjs

      - name: Check if data changed
        id: check
        run: |
          if git diff --quiet public/data/participants.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push updated data
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/participants.json
          git commit -m "Auto-refresh REDCap data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
